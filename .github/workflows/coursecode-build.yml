# Auto-generated by CourseCode Cloud
# coursecode-workflow-version: 2
# Builds the course on push and deploys via batch presign -> direct R2 upload -> finalize.
name: CourseCode Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci || npm install
          npm install --no-save coursecode

      - name: Build course
        run: npx coursecode build

      - name: Deploy to CourseCode Cloud
        run: |
          guess_content_type() {
            case "${1,,}" in
              *.html) echo "text/html" ;;
              *.css) echo "text/css" ;;
              *.js|*.mjs) echo "application/javascript" ;;
              *.json|*.map) echo "application/json" ;;
              *.xml) echo "application/xml" ;;
              *.txt) echo "text/plain" ;;
              *.csv) echo "text/csv" ;;
              *.vtt) echo "text/vtt" ;;
              *.svg) echo "image/svg+xml" ;;
              *.png) echo "image/png" ;;
              *.jpg|*.jpeg) echo "image/jpeg" ;;
              *.gif) echo "image/gif" ;;
              *.webp) echo "image/webp" ;;
              *.avif) echo "image/avif" ;;
              *.ico) echo "image/x-icon" ;;
              *.woff) echo "font/woff" ;;
              *.woff2) echo "font/woff2" ;;
              *.ttf) echo "font/ttf" ;;
              *.mp3) echo "audio/mpeg" ;;
              *.mp4) echo "video/mp4" ;;
              *.webm) echo "video/webm" ;;
              *.pdf) echo "application/pdf" ;;
              *.wasm) echo "application/wasm" ;;
              *.gltf) echo "model/gltf+json" ;;
              *.glb) echo "model/gltf-binary" ;;
              *) echo "application/octet-stream" ;;
            esac
          }

          FILE_LIST=$(cd dist && find . -type f | sed "s|^\./||" | jq -R . | jq -s .)
          TOTAL_SIZE=$(du -sb dist | cut -f1)

          FILES_JSON=$(echo "$FILE_LIST" | jq -r '.[]' | while read -r file_path; do
            jq -n --arg path "$file_path" --arg contentType "$(guess_content_type "$file_path")" '{ path: $path, contentType: $contentType }'
          done | jq -s .)
          PRESIGN_BODY=$(jq -n --argjson files "$FILES_JSON" --argjson size "$TOTAL_SIZE" '{ files: $files, totalSize: $size }')

          PRESIGN=$(curl -fsSL -X POST "${CLOUD_URL}/api/courses/${CLOUD_COURSE_ID}/upload/presign/batch" \
            -H "Authorization: Bearer ${COURSECODE_DEPLOY_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PRESIGN_BODY")

          VERSION_TS=$(echo "$PRESIGN" | jq -r '.versionTimestamp')

          echo "$PRESIGN" | jq -c '.uploads[]'  | while read -r entry; do
            FILE_PATH=$(echo "$entry" | jq -r '.path')
            UPLOAD_URL=$(echo "$entry" | jq -r '.uploadUrl')
            CONTENT_TYPE=$(guess_content_type "$FILE_PATH")
            curl -fsSL -X PUT "$UPLOAD_URL" -H "Content-Type: $CONTENT_TYPE" --data-binary "@dist/$FILE_PATH"
          done

          FILE_COUNT=$(echo "$FILE_LIST" | jq length)
          curl -fsSL -X POST "${CLOUD_URL}/api/courses/${CLOUD_COURSE_ID}/upload/finalize" \
            -H "Authorization: Bearer ${COURSECODE_DEPLOY_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"versionTimestamp\":\"$VERSION_TS\",\"filename\":\"dist.zip\",\"fileCount\":$FILE_COUNT,\"totalSize\":$TOTAL_SIZE,\"previewForce\":true}"
        env:
          COURSECODE_DEPLOY_KEY: ${{ secrets.COURSECODE_DEPLOY_KEY }}
          CLOUD_URL: ${{ secrets.COURSECODE_CLOUD_URL }}
          CLOUD_COURSE_ID: ${{ secrets.COURSECODE_CLOUD_COURSE_ID }}
